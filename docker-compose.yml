version: "3.9"

# Local development environment — all 4 services with hot-reload.
#
# ─── USAGE ──────────────────────────────────────────────────────────────────
#
#  First start (downloads models, ~500 MB each, cached in hf_cache volume):
#    docker compose up --build
#
#  After code changes — NO rebuild needed:
#    docker compose up                      # or: docker compose restart <service>
#    docker compose up smolsearch           # single service only
#
#  Hot-reload (uvicorn --reload):
#    Python source files are bind-mounted from the host into the container.
#    When you save a .py file, uvicorn automatically restarts that service
#    in <1 second — no docker compose down/up required.
#
#  Tear down:
#    docker compose down                    # stop and remove containers
#    docker compose down -v                 # also delete hf_cache model volume
#
# ─── PORTS ──────────────────────────────────────────────────────────────────
#
#  Portal (demo UI): http://localhost:8080  →  recruiter-facing Try it out page
#  SmolSearch:       http://localhost:8081  →  docs at /docs
#  RAGify:           http://localhost:8082  →  docs at /docs
#  AgentFlow:        http://localhost:8083  →  docs at /docs
#  LLMOps Baseline:  http://localhost:8084  →  docs at /docs
#
# ─── HOW HOT-RELOAD WORKS ───────────────────────────────────────────────────
#
#  Each service has TWO volume mounts:
#    1. hf_cache → /app/.cache/huggingface   (persists model downloads between restarts)
#    2. ./NN_project → /app                  (bind-mounts your source code into the container)
#
#  The second mount shadows the COPY in the Dockerfile. Any edit you make to
#  app/, src/, configs/, or data/ on the host is immediately visible inside the
#  container. uvicorn --reload watches for .py changes and restarts the ASGI app.
#
#  The HF model cache is NOT re-downloaded because mount 1 is nested under mount 2
#  at /app/.cache/huggingface and Docker volumes take precedence over bind mounts
#  for that subtree.
#
# ─── PRODUCTION vs DEVELOPMENT ──────────────────────────────────────────────
#
#  This file is for local development only. Production uses Cloud Run with:
#    - No bind-mounts (immutable container image)
#    - HF_HOME=/tmp/.cache/huggingface (Cloud Run ephemeral disk)
#    - No --reload (wastes CPU on a production server)
#    See: deploy/cloudrun*.sh in each project directory.

services:

  portal:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./portal:/usr/share/nginx/html:ro          # bind-mount → edits visible instantly, no rebuild
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  smolsearch:
    build:
      context: ./01_smolsearch
      dockerfile: deploy/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - hf_cache:/app/.cache/huggingface       # persists model downloads
      - ./01_smolsearch:/app                   # bind-mount source → hot-reload
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
      --reload-dir /app/app
      --reload-dir /app/src
      --workers 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  ragify:
    build:
      context: ./02_ragify
      dockerfile: deploy/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - hf_cache:/app/.cache/huggingface       # persists model downloads
      - ./02_ragify:/app                       # bind-mount source → hot-reload
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
      --reload-dir /app/app
      --reload-dir /app/src
      --workers 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  agentflow:
    build:
      context: ./03_agentflow
      dockerfile: deploy/Dockerfile
    ports:
      - "8083:8080"
    environment:
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - hf_cache:/app/.cache/huggingface       # persists model downloads
      - ./03_agentflow:/app                    # bind-mount source → hot-reload
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
      --reload-dir /app/app
      --reload-dir /app/src
      --workers 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  llmops_baseline:
    build:
      context: ./04_llmops_baseline
      dockerfile: deploy/Dockerfile
    ports:
      - "8084:8080"
    environment:
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - hf_cache:/app/.cache/huggingface       # persists model downloads
      - ./04_llmops_baseline:/app              # bind-mount source → hot-reload
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
      --reload-dir /app/app
      --reload-dir /app/src
      --workers 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  hf_cache:
    driver: local
